remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Pages to include in the top navigation bar
header_pages:
  - index.md
  - annual-reports.md
  - 2025-agenda.md
  - 2024-agenda.md
  - 2023-agenda.md
  - 2022-agenda.md
  - contact.md

# Define custom navigation links
navigation:
  - title: "Home"
    url: "/"
  - title: "Annual Reports"
    url: "/annual-reports/"
  - title: "Past Meetings"
    children:
      - title: "2025 Meeting"
        url: "/2025-agenda/"
      - title: "2024 Meeting"
        url: "/2024-agenda/"
      - title: "2023 Meeting"
        url: "/2023-agenda/"
      - title: "2022 Meeting"
        url: "/2022-agenda/"
  - title: "Contact"
    url: "/contact/"



